<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Glow & Grace</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Glow & Grace</h1>
        <nav>
            <a href="index.html">Shop</a>
            <a href="cart.html">Cart</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <main class="contact-container">
        <section class="contact-header">
            <h2>Get in Touch</h2>
            <p>Have questions about our products? We're here to help!</p>
        </section>

        <section class="contact-content">
            <!-- The Contact Form -->
            <form class="contact-form">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" placeholder="email@example.com" required>
                </div>
                <div class="form-group">
                    <label>Message</label>
                    <textarea rows="5" placeholder="How can we help you?"></textarea>
                </div>
                <button type="submit" class="buy-btn">Send Message</button>
            </form>

            <!-- Store Info -->
            <div class="contact-info">
                <h3>Store Information</h3>
                <p>📍 123 Beauty Lane, Glow City</p>
                <p>📞 +1 (555) 012-3456</p>
                <p>✉️ support@glowandgrace.com</p>
                <hr>
                <h3>Hours</h3>
                <p>Mon - Fri: 9am - 6pm</p>
                <p>Sat: 10am - 4pm</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Glow & Grace Beauty. All rights reserved.</p>
    </footer>

</body>
</html>
