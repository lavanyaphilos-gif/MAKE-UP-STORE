<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow & Grace | Makeup Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Glow & Grace</h1>
        <nav>
            <a href="index.html">Shop</a>
            <a href="cart.html" id="cart-count">Cart (0)</a>
        </nav>
    </header>

    <main>
        <section class="product-grid">
            <div class="product-card">
                <img src="Images/foundation.jpg" alt="Foundation">
                <h3>Flawless Foundation</h3>
                <p>$35.00</p>
                <button class="buy-btn">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="Images/blush.jpg" alt="Blush">
                <h3>Rosy Blush</h3>
                <p>$18.00</p>
                <button class="buy-btn">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="Images/concealor.jpg" alt="Concealer">
                <h3>Perfect Concealer</h3>
                <p>$22.00</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
