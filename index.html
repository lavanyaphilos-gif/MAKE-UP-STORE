<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow & Grace | Makeup Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Glow & Grace</h1>
        <nav>
            <a href="#">Shop</a>
            <a href="#">Best Sellers</a>
            <a href="#">About</a>
            <a href="#" id="cart-count">Cart (0)</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Premium Beauty Collection</h2>
            <p>Your daily essentials for a flawless look.</p>
        </section>

        <section class="product-grid">
            
            <div class="product-card">
                <img src="images/foundation.jpg" alt="Foundation">
                <h3>Flawless Foundation</h3>
                <p>$35.00</p>
                <button class="buy-btn">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="images/concealor.jpg" alt="Concealer">
                <h3>Perfect Concealer</h3>
                <p>$22.00</p>
                <button class="buy-btn">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="images/blush.jpg" alt="Blush">
                <h3>Rosy Blush</h3>
                <p>$18.00</p>
                <button class="buy-btn">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="images/mascara.jpg" alt="Mascara">
                <h3>Volume Mascara</h3>
                <p>$20.00</p>
                <button class="buy-btn">Add to Cart</button>
            </div>

            <div class="product-card">
                <img src="images/lipliner.jpg" alt="Lip Liner">
                <h3>Precision Lip Liner</h3>
                <p>$12.00</p>
                <button class="buy-btn">Add to Cart</button>
            </div>
