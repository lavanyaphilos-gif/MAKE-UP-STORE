<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow & Grace | Makeup Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>GLOW & GRACE</h1>
        <nav>
            <a href="index.html">Shop</a>
            <a href="cart.html" id="cart-count">Cart (0)</a>
        </nav>
    </header>

    <main class="product-grid">
        <div class="product-card">
            <img src="Images/foundation.jpg" alt="Foundation">
            <h3>Flawless Foundation</h3>
            <p>$35.00</p>
            <button class="buy-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="Images/blush.jpg" alt="Blush">
            <h3>Rosy Blush</h3>
            <p>$18.00</p>
            <button class="buy-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="Images/concealor.jpg" alt="Concealer">
            <h3>Perfect Concealer</h3>
            <p>$22.00</p>
            <button class="buy-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="Images/lipliner.jpg" alt="Lip Liner">
            <h3>Precision Lip Liner</h3>
            <p>$12.00</p>
            <button class="buy-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="Images/lipgloss.jpg" alt="Lip Gloss">
            <h3>High Shine Gloss</h3>
            <p>$15.00</p>
            <button class="buy-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="Images/mascara.jpg" alt="Mascara">
            <h3>Volume Mascara</h3>
            <p>$20.00</p>
            <button class="buy-btn">Add to Cart</button>
        </div>

        <div class="product-card">
            <img src="Images/setting spray.jpg" alt="Setting Spray">
            <h3>All Day Setting Spray</h3>
            <p>$25.00</p>
            <button class="buy-btn">Add to Cart</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
